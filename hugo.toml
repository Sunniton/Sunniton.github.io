baseURL = "https://Sunniton.github.io/"
languageCode = "zh-cn"
title = "Sunniton 的博客"
theme = "PaperMod"
paginate = 10

[params]
  author = "Sunniton"
  description = "个人博客，记录学习与生活"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true

  [params.homeInfoParams]
    Title = "👋 欢迎来到我的博客"
    Content = "这里是 Sunniton 的个人空间，记录技术、学习和生活。"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/Sunniton"

[menu]
  [[menu.main]]
    identifier = "home"
    name = "首页"
    url = "/"
    weight = 1
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 2
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 3
  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 4

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    style = "dracula"
    lineNos = true
